<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gushaka Umukunzi</title>
    <style>
        body {
            background-color: #fff0f5;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        input, select {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ff69b4;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            width: 85%;
        }
    </style>
</head>
<body>

    <h1>Gushaka Umukunzi App 💖</h1>
    <p>Injiza amakuru yawe hano ngo ubone uwo mwijuje:</p>

    <label>Izina ryawe:</label> <br>
    <input type="text" placeholder="Andika izina hano...">
    <br><br>

    <label>Nimero ya telefone yawe:</label> <br>
    <input type="tel" placeholder="Andika nimero hano...">
    <br><br>

    <label>Ushaka umugabo cyangwa umugore?:</label> <br>
    <select>
        <option>Umugore</option>
        <option>Umugabo</option>
    </select>
    <br><br>

    <button onclick="document.getElementById('ubutumwa').innerText = 'Gushakisha byatangiye... Shahu Pacifique, twamubonye! Inziza nimero ya telefone ubu!'">Shakisha Ubu!</button>
    
    <p id="ubutumwa" style="color: red; font-weight: bold; margin-top: 20px;"></p>

</body>
</html>
